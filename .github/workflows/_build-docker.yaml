name: Build docker
on:
  workflow_call:
    inputs:
      env:
        required: false
        type: string
      app:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      image_tag_suffix:
        required: false
        type: string
        default: ''
      publish_latest:
        required: false
        type: boolean
        default: false
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env != '' && format('{0}-{1}', inputs.app, inputs.env) || fromJSON('null') }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image-tags.outputs.image_tag }}
      version: ${{ steps.mfe-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read MFE version
        id: mfe-version
        env:
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          APP_PATH=$(dirname "$DOCKERFILE")
          VERSION=$(jq -r '.version' "$APP_PATH/package.json")

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to read version from $APP_PATH/package.json"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "MFE version: $VERSION"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image-tags
        env:
          IMAGE_TAG_SUFFIX: ${{ inputs.image_tag_suffix }}
        run: |
          set -euo pipefail

          image_tag="ghcr.io/${{ github.repository }}/${{ inputs.app }}:${{ github.sha }}${IMAGE_TAG_SUFFIX}"
          tags="$image_tag"
          if [ "${{ inputs.publish_latest }}" = "true" ]; then
            tags="${tags}"$'\n'"ghcr.io/${{ github.repository }}/${{ inputs.app }}:latest"
          fi

          {
            echo "image_tag=${image_tag}"
            echo 'tags<<EOF'
            printf '%s\n' "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.MEDUSA_BACKEND_URL }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BFF_URL=${{ secrets.BFF_URL }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.STOREFRONT_BASE_URL }}

  # Trivy scan temporarily disabled
