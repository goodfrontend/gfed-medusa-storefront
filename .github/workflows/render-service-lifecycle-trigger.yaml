name: Trigger Suspend/Resume Render Services Schedule

on:
  workflow_dispatch:
    inputs:
      target_epoch:
        description: 'Scheduled run time in UTC unix epoch seconds'
        required: true
        type: string
      parent_run_id:
        description: 'Configure workflow run that created this watcher'
        required: false
        type: string

permissions:
  contents: read
  actions: write

jobs:
  wait-and-trigger:
    name: Wait and dispatch Render service reconciler
    runs-on: ubuntu-latest
    steps:
      - name: Wait until scheduled time
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_EPOCH: ${{ inputs.target_epoch }}
          PARENT_RUN_ID: ${{ inputs.parent_run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          case "$TARGET_EPOCH" in
            (*[!0-9]*|'')
              echo "::error::Invalid target_epoch input: '${TARGET_EPOCH}'"
              exit 1
              ;;
          esac

          now_epoch="$(date -u +%s)"
          remaining=$((TARGET_EPOCH - now_epoch))
          chunk_seconds=18000
          dispatch_ref="${DEFAULT_BRANCH:-${GITHUB_REF_NAME}}"

          dispatch_workflow() {
            local workflow_file="$1"
            local payload="$2"
            local out_file="$3"

            curl -sS -o "$out_file" -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/dispatches"
          }

          if [ "$remaining" -gt "$chunk_seconds" ]; then
            echo "::notice::Scheduled run is in ${remaining}s (> ${chunk_seconds}s). Sleeping ${chunk_seconds}s then chaining watcher."
            sleep "$chunk_seconds"

            chain_payload="$(jq -cn \
              --arg ref "$dispatch_ref" \
              --arg target_epoch "$TARGET_EPOCH" \
              --arg parent_run_id "$PARENT_RUN_ID" \
              '{ref:$ref,inputs:{target_epoch:$target_epoch,parent_run_id:$parent_run_id}}')"

            chain_status="$(dispatch_workflow "render-service-lifecycle-trigger.yaml" "$chain_payload" /tmp/render_service_trigger_chain.json)"

            if [ "$chain_status" != "204" ]; then
              echo "::error::Failed to chain the Render service watcher (HTTP ${chain_status})."
              cat /tmp/render_service_trigger_chain.json
              exit 1
            fi

            echo "::notice::Chained Render service watcher successfully."
            exit 0
          fi

          if [ "$remaining" -gt 0 ]; then
            echo "::notice::Sleeping ${remaining}s until target epoch ${TARGET_EPOCH}."
            sleep "$remaining"
          else
            echo "::notice::Target epoch already passed by $((0 - remaining))s; dispatching reconciler now."
          fi

          reconciler_payload="$(jq -cn --arg ref "$dispatch_ref" '{ref:$ref}')"
          reconciler_status="$(dispatch_workflow "render-service-lifecycle-reconciler.yaml" "$reconciler_payload" /tmp/render_service_reconciler_dispatch.json)"

          if [ "$reconciler_status" != "204" ]; then
            echo "::error::Failed to dispatch the Render service reconciler (HTTP ${reconciler_status})."
            cat /tmp/render_service_reconciler_dispatch.json
            exit 1
          fi

          echo "::notice::Dispatched the Render service reconciler."
