# NOTE: The env groups should be first created in the Render dashboard
# Since they do not allow `sync: false` in env groups, this is seems to be the only way

projects:
  - name: gfed-storefront-project
    environments:
      - name: production
        services:
          - type: web
            runtime: image
            plan: free
            name: sf-home-prod
            region: frankfurt
            autoDeployTrigger: off
            image:
              url: ghcr.io/goodfrontend/gfed-medusa-storefront/sf-home:prod-latest
            envVars:
              - fromGroup: sf-prod-env-group

          - type: web
            runtime: image
            plan: free
            name: sf-account-prod
            region: frankfurt
            autoDeployTrigger: off
            image:
              url: ghcr.io/goodfrontend/gfed-medusa-storefront/sf-account:prod-latest
